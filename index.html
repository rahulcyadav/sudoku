    <style>
      .container {
        width: 90%;
        margin: auto;
      }

      #controls {
        float: right;
        width: 30%;
      }

      #board {
        float: left;
      }

      header {
        background-color: black;
        color: white;
        text-align: center;
        padding: 5px;
        margin: auto;
      }

      section {
        /* margin: auto; */
        /* width:90%; */
        padding: 20px;
      }

      footer {
        background-color: gray;
        color: white;
        clear: both;
        text-align: center;
        padding: 5px;
      }

      body {
        font-family: Verdana, Geneva, sans-serif;
      }

      td {
        border: 1px solid black;
        height: 60px;
        width: 60px;
        text-align: center;
        font-size: 48px;
        cursor: default;
        padding: 8px;
      }

      #solution td {
        border: 1px solid black;
        height: 20px;
        width: 20px;
        text-align: center;
        font-size: 12px;
        cursor: default;
        padding: 4px;
      }

      .topleft,
      .topright,
      .centre,
      .bottomleft,
      .bottomright {
        background-color: #f2f2f2;
      }

      .possible td {
        font-size: 14px;
        height: 15px;
        width: 15px;
        border: none /* 1px solid black */;
        padding: 0px;
      }

      .inputbutton:hover {
        background-color: lightgray;
      }

      #selected {
        background-color: lightgray;
        /* color: white; */
        /* opacity: 0.7; */
      }

      .solved {
        color: green;
      }

      .solved1 {
        color: red;
      }

      .userInput {
        color: blue;
      }

      .marked {
        background-color: lightpink;
        /* opacity: 0.3; */
      }

      .highlight {
        background-color: #ff4d4d;
      }

      .locked {
        font-weight: Bold;
      }

      table {
        /* margin: auto; */
        /*border: 1px solid black;*/
      }

      div,
      h2 {
        margin: auto;
      }

      input[type="button"],
      input[type="submit"] {
        width: 100%;
        background-color: #4caf50;
        color: white;
        padding: 14px 20px;
        margin: 8px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }

      input[type="button"]:hover,

        /* margin: auto; */

        border: 1px solid #ccc;
        border-radius: 4px;

            $("select").append(opt);
          });

          if (!$(this).hasClass("locked")) {
            $("#selected").removeAttr("id");
            $(this).attr("id", "selected");
          }
        });

        $(".inputbutton").click(function () {
          input = $(this).html();
          if (input === "clear") {
            $("#selected")
              .empty()
              .addClass("empty")
              .removeClass("possible userInput");
          } else {
            $("#selected")
              .html(input)
              .addClass("userInput")
              .removeClass("empty possible");
          }
        });
      });

      function lock() {
        $("#selected").removeAttr("id");
        $("#board td").each(function () {
          if ($(this).html() !== "" && !$(this).hasClass("possible")) {
            $(this).addClass("locked");
          }
        });
        $("#lock").attr({ value: "Unlock", onclick: "unlock()" });
      }

      function unlock() {
        $(".locked").each(function () {
          $(this).removeClass("locked");
        });
        $("#lock").attr({ value: "Lock", onclick: "lock()" });
      }

      function validate() {
        $(".marked").removeClass("marked");
        $(classes2).each(function (index, value) {
          //console.log(this);
          $("#board ." + this).each(function () {
            if ($(this).html() != "") {
              if (status1[parseInt($(this).html(), 10)]) {
                var current = $(this).html();
                $("." + value).each(function () {
                  //debugger
                  if ($(this).html() === current) {
                    $(this).addClass("marked");
                  }
                });
              } else {
                status1[parseInt($(this).html(), 10)] = true;
              }
            }
          });
          status1 = [
            false,
            false,
            false,
            false,
            false,
            false,
            false,
            false,
            false,
            false,
          ];
        });
      }

      function solve() {
        showPossible();

        //pass1
        $(".possible").each(function () {
          var current = this;
          var count = 0;
          var temp = 0;

          $("td", this).each(function () {
            if ($(this).html() !== "") {
              count++;
              temp = $(this).html();
            }
          });

          //finalize where only one possible
          if (count === 1) {
            $(this).html(temp).removeClass("empty possible").addClass("solved");
            $(classes2).each(function () {
              if ($(current).hasClass(this)) {
                $("." + this).each(function () {
                  $("td", this).each(function () {
                    if ($(this).html() == temp) {
                      $(this).empty();
                    }
                  });
                });
              }
            });
          }
          count = 0;
          temp = 0;
        });

        //pass2
        //finalize when a number is possible only once in a class
        $(classes2).each(function () {
          var possibleCount = [0, 0, 0, 0, 0, 0, 0, 0, 0];
          $("." + this).each(function () {
            $("td", this).each(function () {
              //debugger
              if ($(this).html() != "") {
                possibleCount[parseInt($(this).html(), 10) - 1]++;
              }
            });
          });
          //console.log(value);
          //debugger
          $("." + this).each(function () {
            //debugger
            var current1 = this;
            $("td", this).each(function () {
              if ($(this).html() != "") {
                if (possibleCount[parseInt($(this).html(), 10) - 1] === 1) {
                  var temp1 = $(this).html();
                  $(current1)
                    .html(temp1)
                    .addClass("solved1")
                    .removeClass("empty possible");
                  $(classes2).each(function () {
                    if ($(current1).hasClass(this)) {
                      $("." + this).each(function () {
                        $("td", this).each(function () {
                          if ($(this).html() === temp1) {
                            $(this).empty();
                          }
                        });
                      });
                    }
                  });
                }
              }
            });
          });
        });
      }

      function showPossible() {
        //mark empty cells
        $("#board td").each(function () {
          if ($(this).html() === "") {
            $(this).addClass("empty");
          }
        });

        //mark possible numbers in empty cells
        $(".empty").each(function () {
          $(this).empty();
          var current = this;
          var count = 0;
          var temp = 0;
          var i = 0;

          $(classes2).each(function (index, value) {
            if ($(current).hasClass(this)) {
              $("#board ." + this).each(function () {
                if (!$(this).hasClass("empty")) {
                  //console.log(this);
                  status1[parseInt($(this).html(), 10)] = true;
                }
              });
            }
          });

          for (i = 1; i <= 9; i++) {
            if (!status1[i]) {
              count++;
              temp = i;
            }
          }

          $(this)
            .html(
              "<table><tr><td></td><td></td><td></td></tr><tr><td></td><td></td><td></td></tr><tr><td></td><td></td><td></td></tr></table>",

            .addClass("possible");

          $("td", this).each(function (index) {
            if (!status1[index + 1]) {
              $(this).html(index + 1);
            }
          });
          status1 = [
            false,
            false,

        });
      }

      function loadGame() {
        var loadClasses = [
          ".row1",
          ".row2",
          ".row3",
          ".row4",
          ".row5",
          ".row6",
          ".row7",
          ".row8",
          ".row9",
        ];

        $("#solution").hide();
        $("#board td").removeClass(
          "marked empty possible locked solved solved1 userInput",
        );
        $("#selected").removeAttr("id");

        $(loadClasses).each(function (index, value) {
          var upperIndex = index;
          $("#board " + value).each(function (index) {
            var game;
            var solution;
            if ($("select").val() == "blank") {
              game = 0;
              solution = 0;
            } else {
              var game = games[$("select").val()]["game"][upperIndex][index];
              var solution =
                games[$("select").val()]["solution"][upperIndex][index];
            }

            if (game == 0) {
              $(this).empty();
            } else {
              $(this).html(game).addClass("locked");
            }

            if (solution == 0) {
              $("#solution " + value + ":eq(" + index + ")").empty();
            } else {
              $("#solution " + value + ":eq(" + index + ")").html(solution);
            }
          });
        });
      }
